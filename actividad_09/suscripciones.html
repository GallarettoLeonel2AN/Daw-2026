<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario DAW | Suscripción</title>
    
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="suscripcion.js" defer></script>
</head>
<body>

    <header class="cabecera-sitio">
        <div class="top-bar">
            <p class="fecha-diario">Lunes, 25 de Mayo de 2026</p>
            <h1 class="logo-diario">Diario DAW</h1>
            <span class="icono-menu">☰</span>
        </div>
        <nav class="menu-principal">
            <ul class="lista-nav">
                <li><a href="index.html">Último Momento</a></li>
                <li><a href="#">Política</a></li>
                <li><a href="#">Deportes</a></li>
                <li><a href="#">Espectáculos</a></li>
            </ul>
        </nav>
    </header>

    <div class="contenedor-layout">
        <main class="seccion-formulario">
            
            <h2 id="titulo-hola">HOLA</h2>
            
            <form id="form-suscripcion" class="formulario-grilla">
                
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre">
                    <span class="msj-error" id="error-nombre"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email">
                    <span class="msj-error" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password">
                    <span class="msj-error" id="error-password"></span>
                </div>

                <div class="form-group">
                    <label for="repetir-password">Repetir contraseña</label>
                    <input type="password" id="repetir-password" name="repetir-password">
                    <span class="msj-error" id="error-repetir-password"></span>
                </div>

                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad">
                    <span class="msj-error" id="error-edad"></span>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono">
                    <span class="msj-error" id="error-telefono"></span>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion">
                    <span class="msj-error" id="error-direccion"></span>
                </div>

                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" name="ciudad">
                    <span class="msj-error" id="error-ciudad"></span>
                </div>

                <div class="form-group">
                    <label for="codigo-postal">Código Postal</label>
                    <input type="text" id="codigo-postal" name="codigo-postal">
                    <span class="msj-error" id="error-codigo-postal"></span>
                </div>

                <div class="form-group">
                    <label for="dni">DNI</label>
                    <input type="text" id="dni" name="dni">
                    <span class="msj-error" id="error-dni"></span>
                </div>

                <div class="btn-contenedor">
                    <button type="submit" id="btn-enviar">Enviar</button>
                </div>

            </form>
        </main>
    </div>

    <footer class="pie-pagina">
        <p>&copy; 2026 Diario DAW . Todos los derechos reservados.</p>
    </footer>

</body>
</html>
